<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCC Upload Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Kanit',sans-serif;background:linear-gradient(135deg,#1e2433,#0f3460);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.logo{width:52px;height:52px;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;margin:0 auto 16px}
h1{text-align:center;font-size:18px;font-weight:600;color:#1e2433;margin-bottom:4px}
.sub{text-align:center;font-size:12px;color:#8e8e8e;margin-bottom:28px}
.upload-area{border:2px dashed #e0e0e0;border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px;background:#f9f9f9}
.upload-area:hover,.upload-area.drag{border-color:#0095f6;background:#e8f4fe}
.upload-icon{font-size:36px;margin-bottom:8px}
.upload-text{font-size:14px;color:#8e8e8e}
.upload-text strong{color:#0095f6}
#file-input{display:none}
.file-selected{background:#e8f8f0;border:2px solid #2ecc71;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:none;align-items:center;gap:10px}
.file-icon{font-size:24px}
.file-info{flex:1}
.file-name{font-size:13px;font-weight:500;color:#1e2433}
.file-size{font-size:11px;color:#8e8e8e}
.btn{width:100%;font-family:'Kanit',sans-serif;font-size:14px;font-weight:500;border:none;border-radius:10px;padding:13px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.btn-primary{background:#0095f6;color:#fff}
.btn-primary:hover{background:#0081d6}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-view{background:#f4f6f9;color:#1e2433;font-size:13px}
.btn-view:hover{background:#e0e0e0}
.status{border-radius:10px;padding:14px 16px;font-size:13px;margin-bottom:12px;display:none;align-items:center;gap:10px}
.status-loading{background:#e8f4fe;color:#0066b3}
.status-success{background:#e8f8f0;color:#27ae60}
.status-error{background:#fdecea;color:#c0392b}
.spinner-sm{width:18px;height:18px;border:2px solid rgba(0,102,179,.3);border-top-color:#0066b3;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.preview{background:#f9f9f9;border-radius:10px;padding:14px;margin-bottom:16px;display:none}
.preview-title{font-size:11px;color:#8e8e8e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.preview-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #f0f0f0}
.preview-row:last-child{border:none}
.preview-label{color:#8e8e8e}
.preview-value{font-weight:500;color:#1e2433}
.footer{text-align:center;font-size:10px;color:#8e8e8e;margin-top:8px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡</div>
  <h1>DCC Upload Tool</h1>
  <div class="sub">อัปโหลด Excel → Dashboard อัปเดตทันที</div>

  <!-- Upload Area -->
  <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()" ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)" ondrop="onDrop(event)">
    <div class="upload-icon">📂</div>
    <div class="upload-text">คลิกหรือลากไฟล์มาวางตรงนี้<br><strong>Operations_Data.xlsx</strong></div>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls" onchange="onFileSelect(event)">

  <!-- File Selected -->
  <div class="file-selected" id="file-selected">
    <div class="file-icon">📊</div>
    <div class="file-info">
      <div class="file-name" id="file-name">—</div>
      <div class="file-size" id="file-size">—</div>
    </div>
    <span style="cursor:pointer;color:#8e8e8e" onclick="clearFile()">✕</span>
  </div>

  <!-- Preview -->
  <div class="preview" id="preview">
    <div class="preview-title">📋 ตรวจสอบข้อมูล</div>
    <div class="preview-row"><span class="preview-label">จำนวนรายการ</span><span class="preview-value" id="p-rows">—</span></div>
    <div class="preview-row"><span class="preview-label">ปีแรก</span><span class="preview-value" id="p-first">—</span></div>
    <div class="preview-row"><span class="preview-label">ปีล่าสุด</span><span class="preview-value" id="p-last">—</span></div>
    <div class="preview-row"><span class="preview-label">Unit 1 ล่าสุด</span><span class="preview-value" id="p-u1">—</span></div>
    <div class="preview-row"><span class="preview-label">Unit 2 ล่าสุด</span><span class="preview-value" id="p-u2">—</span></div>
  </div>

  <!-- Status -->
  <div class="status status-loading" id="status-loading">
    <div class="spinner-sm"></div>
    <span id="status-loading-text">กำลังประมวลผล...</span>
  </div>
  <div class="status status-success" id="status-success">
    <span>✅</span><span id="status-success-text">อัปโหลดสำเร็จ! Dashboard อัปเดตแล้ว</span>
  </div>
  <div class="status status-error" id="status-error">
    <span>❌</span><span id="status-error-text">เกิดข้อผิดพลาด</span>
  </div>

  <!-- Buttons -->
  <button class="btn btn-primary" id="btn-upload" onclick="doUpload()" disabled>⬆️ Upload ขึ้น Dashboard</button>
  <button class="btn btn-view" onclick="window.open('https://sompong79.github.io/DCC-Test/','_blank')">👁 ดู Dashboard</button>

  <div class="footer">BLCP Power Limited · DCC Analytics</div>
</div>

<script>
const GITHUB_TOKEN = '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';
const GITHUB_REPO = 'Sompong79/Operation-Data';
const GITHUB_FILE = 'data.json';
const DCC_LIMIT = 673250;

let parsedData = null;

// ===== DRAG & DROP =====
function onDrag(e, over) { e.preventDefault(); document.getElementById('upload-area').classList.toggle('drag', over); }
function onDrop(e) { e.preventDefault(); onDrag(e, false); const f = e.dataTransfer.files[0]; if (f) processFile(f); }
function onFileSelect(e) { const f = e.target.files[0]; if (f) processFile(f); }
function clearFile() {
  parsedData = null;
  document.getElementById('file-selected').style.display = 'none';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('btn-upload').disabled = true;
  document.getElementById('file-input').value = '';
  hideStatus();
}

// ===== PROCESS FILE =====
function processFile(file) {
  hideStatus(); showStatus('loading', 'กำลังอ่านไฟล์ Excel...');
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array', cellDates: true });
      const sn = wb.SheetNames.find(n => n.toLowerCase().includes('dcc')) || wb.SheetNames[0];
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: '' });
      if (!rows || rows.length < 2) throw new Error('ไม่พบข้อมูลในไฟล์');

      const headers = rows[0].map(v => String(v || '').toLowerCase());
      const find = kws => { for (const k of kws) { const i = headers.findIndex(h => h.includes(k)); if (i >= 0) return i; } return -1; };
      const idx = {
        year: find(['year', 'ปี']) >= 0 ? find(['year', 'ปี']) : 0,
        half: find(['half', 'รอบ']) >= 0 ? find(['half', 'รอบ']) : 1,
        dateU1: find(['date_u1', 'test_date_u1', 'date u1']) >= 0 ? find(['date_u1', 'test_date_u1', 'date u1']) : 2,
        netU1: find(['net_cap_u1', 'net cap_u1']) >= 0 ? find(['net_cap_u1', 'net cap_u1']) : 3,
        cwtU1: find(['cwt_u1', 'cwt']) >= 0 ? find(['cwt_u1', 'cwt']) : 6,
        dateU2: find(['date_u2', 'test_date_u2', 'date u2']) >= 0 ? find(['date_u2', 'test_date_u2', 'date u2']) : 8,
        netU2: find(['net_cap_u2', 'net cap_u2']) >= 0 ? find(['net_cap_u2', 'net cap_u2']) : 9,
        cwtU2: find(['cwt_u2']) >= 0 ? find(['cwt_u2']) : 12,
        passU1: find(['pass_u1']) >= 0 ? find(['pass_u1']) : 14,
        passU2: find(['pass_u2']) >= 0 ? find(['pass_u2']) : 15,
      };
      const fmtDate = v => { if (!v) return ''; if (v instanceof Date) return v.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' }); return String(v); };
      parsedData = rows.slice(1).filter(r => r[idx.year] !== '' && r[idx.year] !== undefined).map(r => [
        r[idx.year], r[idx.half], fmtDate(r[idx.dateU1]),
        Number(r[idx.netU1]) || 0, 0, 0, Number(r[idx.cwtU1]) || 0, 0,
        fmtDate(r[idx.dateU2]), Number(r[idx.netU2]) || 0, 0, 0,
        Number(r[idx.cwtU2]) || 0, 0, r[idx.passU1] || '', r[idx.passU2] || ''
      ]);

      if (!parsedData.length) throw new Error('ไม่พบข้อมูลใน Sheet');

      // Show file info
      const fs = document.getElementById('file-selected');
      fs.style.display = 'flex';
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-size').textContent = (file.size / 1024).toFixed(1) + ' KB · ' + parsedData.length + ' รายการ';

      // Show preview
      const years = parsedData.map(r => r[0]).sort();
      const lastU1 = [...parsedData].filter(r => r[3] > 0).pop();
      const lastU2 = [...parsedData].filter(r => r[9] > 0).pop();
      document.getElementById('preview').style.display = 'block';
      document.getElementById('p-rows').textContent = parsedData.length + ' รายการ';
      document.getElementById('p-first').textContent = years[0] || '—';
      document.getElementById('p-last').textContent = years[years.length - 1] || '—';
      document.getElementById('p-u1').textContent = lastU1 ? lastU1[3].toLocaleString() + ' kW' : '—';
      document.getElementById('p-u2').textContent = lastU2 ? lastU2[9].toLocaleString() + ' kW' : '—';

      document.getElementById('btn-upload').disabled = false;
      hideStatus();
    } catch (err) { showStatus('error', 'อ่านไฟล์ไม่ได้: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ===== UPLOAD =====
async function doUpload() {
  if (!parsedData) return;
  document.getElementById('btn-upload').disabled = true;
  showStatus('loading', 'กำลัง Upload ขึ้น GitHub...');

  try {
    // Get current SHA
    const getRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
      headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json' }
    });
    let sha = null;
    if (getRes.ok) { const d = await getRes.json(); sha = d.sha; }

    // Upload
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(parsedData))));
    const body = { message: 'Update DCC data ' + new Date().toISOString().slice(0, 10), content, ...(sha ? { sha } : {}) };
    const putRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
      method: 'PUT',
      headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!putRes.ok) throw new Error('GitHub API Error: ' + putRes.status);
    showStatus('success', '✅ Upload สำเร็จ! Dashboard อัปเดตแล้ว · ' + new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }));
    document.getElementById('btn-upload').disabled = false;
  } catch (err) {
    showStatus('error', 'Upload ไม่สำเร็จ: ' + err.message);
    document.getElementById('btn-upload').disabled = false;
  }
}

// ===== STATUS =====
function showStatus(type, msg) {
  hideStatus();
  if (type === 'loading') { document.getElementById('status-loading-text').textContent = msg; document.getElementById('status-loading').style.display = 'flex'; }
  else if (type === 'success') { document.getElementById('status-success-text').textContent = msg; document.getElementById('status-success').style.display = 'flex'; }
  else { document.getElementById('status-error-text').textContent = msg; document.getElementById('status-error').style.display = 'flex'; }
}
function hideStatus() {
  ['status-loading', 'status-success', 'status-error'].forEach(id => document.getElementById(id).style.display = 'none');
}
</script>
</body>
</html>
